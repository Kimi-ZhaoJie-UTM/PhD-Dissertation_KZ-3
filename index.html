<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internauka Conference Proceedings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Language Switcher */
        .language-switcher {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .lang-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            background: transparent;
            color: #666;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .lang-btn:hover {
            border-color: #c2185b;
            color: #c2185b;
            transform: translateY(-2px);
        }

        .lang-btn.active {
            background: #c2185b;
            color: white;
            border-color: #c2185b;
        }

        /* Main Cover Container */
        .cover-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 60px 80px;
            position: relative;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        /* Header Section */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 80px;
            position: relative;
        }

        /* Location Styling */
        .location {
            color: #c2185b;
            font-size: 24px;
            line-height: 1.3;
            font-weight: 500;
            letter-spacing: 0.5px;
            opacity: 0;
            animation: fadeInLeft 1s ease forwards;
        }

        /* Logo Styling */
        .logo-container {
            text-align: center;
            opacity: 0;
            animation: fadeInRight 1s ease 0.3s forwards;
        }

        .logo-box {
            background: #2c2c2c;
            padding: 15px 30px;
            display: inline-block;
            transform: skew(-5deg);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .logo-text {
            color: white;
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 2px;
            font-style: italic;
            transform: skew(5deg);
            display: block;
            line-height: 1;
            font-family: 'Arial Black', Arial, sans-serif;
        }

        .logo-sub {
            color: #888;
            font-size: 18px;
            margin-top: 5px;
            letter-spacing: 3px;
            font-weight: 400;
            transform: skew(5deg);
            display: block;
        }

        /* Content Section */
        .content {
            text-align: center;
            margin-top: auto;
            margin-bottom: auto;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .conference-number {
            font-size: 28px;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 500;
            opacity: 0;
            animation: fadeInUp 1s ease 0.6s forwards;
        }

        .main-title {
            color: #c2185b;
            font-size: 52px;
            font-weight: 700;
            line-height: 1.2;
            text-transform: uppercase;
            letter-spacing: 1px;
            max-width: 900px;
            margin: 0;
            opacity: 0;
            animation: fadeInUp 1s ease 0.9s forwards;
        }

        /* Next Page Button */
        .next-page-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 32px;
            background: transparent;
            color: #c2185b;
            border: 2px solid #c2185b;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            opacity: 0;
            animation: fadeInUp 1s ease 1.2s forwards;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        .next-page-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #c2185b;
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
        }

        .next-page-btn:hover {
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(194, 24, 89, 0.3);
        }

        .next-page-btn:hover::before {
            transform: translateX(0);
        }

        .next-page-btn:active {
            transform: translateY(-1px);
        }

        .btn-text {
            position: relative;
            z-index: 1;
        }

        .btn-icon {
            width: 20px;
            height: 20px;
            position: relative;
            z-index: 1;
            transition: transform 0.3s ease;
        }

        .next-page-btn:hover .btn-icon {
            transform: translateX(5px);
        }

        /* Wave Decoration */
        .wave-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 300px;
            overflow: hidden;
            pointer-events: none;
        }

        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .wave-line {
            fill: none;
            stroke-width: 2;
            opacity: 0.8;
        }

        /* Animations */
        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Pulse animation for button attention */
        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(194, 24, 89, 0.4);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(194, 24, 89, 0);
            }
        }

        .next-page-btn.pulse {
            animation: pulse 2s infinite;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .cover-container {
                padding: 40px 30px;
            }
            
            .header {
                flex-direction: column;
                gap: 30px;
                margin-bottom: 60px;
            }
            
            .location {
                font-size: 20px;
            }
            
            .logo-text {
                font-size: 32px;
            }
            
            .conference-number {
                font-size: 20px;
            }
            
            .main-title {
                font-size: 28px;
            }
            
            .next-page-btn {
                font-size: 16px;
                padding: 14px 28px;
            }

            .language-switcher {
                top: 10px;
                right: 10px;
                padding: 8px;
            }
            
            .lang-btn {
                padding: 6px 12px;
                font-size: 12px;
            }
        }

        /* Print Styles */
        @media print {
            .language-switcher,
            .next-page-btn {
                display: none;
            }
            .cover-container {
                page-break-after: always;
            }
        }
    </style>
</head>
<body>

    <!-- Language Switcher -->
    <div class="language-switcher">
        <button class="lang-btn active" onclick="changeLanguage('en')" data-lang="en">English</button>
        <button class="lang-btn" onclick="changeLanguage('ru')" data-lang="ru">Русский</button>
        <button class="lang-btn" onclick="changeLanguage('zh')" data-lang="zh">中文</button>
    </div>

    <!-- Cover Content -->
    <div class="cover-container">
        <header class="header">
            <div class="location" data-i18n="location">
                Madrid,<br>Spain 2025
            </div>
            
            <div class="logo-container">
                <div class="logo-box">
                    <span class="logo-text">INTERNAUKA</span>
                </div>
                <span class="logo-sub">internauka.org</span>
            </div>
        </header>

        <main class="content">
            <div class="conference-number" data-i18n="conference">
                LVIII International Multidisciplinary Conference
            </div>
            
            <h1 class="main-title" data-i18n="title">
                Prospects and Key Tendencies of Science in Contemporary World
            </h1>

            <button class="next-page-btn pulse" onclick="goToNextPage(title-page.html)" data-i18n="nextBtn">
                <span class="btn-text">Proceed to Contents</span>
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </button>
        </main>

        <!-- Decorative Waves -->
        <div class="wave-container">
            <svg class="wave" viewBox="0 0 1200 300" preserveAspectRatio="none">
                <path class="wave-line" stroke="#e91e63" stroke-width="3" d="M0,200 Q150,180 300,200 T600,220 T900,200 T1200,220" opacity="0.6"/>
                <path class="wave-line" stroke="#9c27b0" stroke-width="2" d="M0,220 Q150,200 300,220 T600,240 T900,220 T1200,240" opacity="0.5"/>
                <path class="wave-line" stroke="#673ab7" stroke-width="2" d="M0,240 Q150,220 300,240 T600,260 T900,240 T1200,260" opacity="0.4"/>
                <path class="wave-line" stroke="#3f51b5" stroke-width="2" d="M0,260 Q150,240 300,260 T600,280 T900,260 T1200,280" opacity="0.3"/>
                <path class="wave-line" stroke="#2196f3" stroke-width="2" d="M0,280 Q150,260 300,280 T600,300 T900,280 T1200,300" opacity="0.2"/>
                <path class="wave-line" stroke="#e91e63" stroke-width="1" d="M0,190 Q200,170 400,190 T800,210 T1200,190" opacity="0.3"/>
                <path class="wave-line" stroke="#ff5722" stroke-width="2" d="M0,210 Q200,190 400,210 T800,230 T1200,210" opacity="0.4"/>
                <path class="wave-line" stroke="#ff9800" stroke-width="1" d="M0,230 Q200,210 400,230 T800,250 T1200,230" opacity="0.3"/>
            </svg>
        </div>
    </div>

    <script>
        // Translations
        const translations = {
            en: {
                location: "Madrid,<br>Spain 2025",
                conference: "LVIII International Multidisciplinary Conference",
                title: "Prospects and Key Tendencies of Science in Contemporary World",
                nextBtn: "Proceed to Contents"
            },
            ru: {
                location: "Мадрид,<br>Испания 2025",
                conference: "LVIII Международная мультидисциплинарная конференция",
                title: "Перспективы и ключевые тенденции науки в современном мире",
                nextBtn: "Перейти к содержанию"
            },
            zh: {
                location: "西班牙马德里<br>2025年",
                conference: "第五十八届国际多学科会议",
                title: "当代世界科学的前景与主要趋势",
                nextBtn: "进入目录"
            }
        };

        // Language switching function
        function changeLanguage(lang) {
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-lang') === lang) {
                    btn.classList.add('active');
                }
            });

            const elements = document.querySelectorAll('[data-i18n]');
            elements.forEach((element, index) => {
                element.style.opacity = '0';
                element.style.transform = 'translateY(10px)';
                
                setTimeout(() => {
                    const key = element.getAttribute('data-i18n');
                    if (translations[lang] && translations[lang][key]) {
                        if (element.tagName === 'BUTTON') {
                            element.querySelector('.btn-text').textContent = translations[lang][key];
                        } else {
                            element.innerHTML = translations[lang][key];
                        }
                    }
                    element.style.opacity = '1';
                    element.style.transform = 'translateY(0)';
                }, 300 + (index * 100));
            });

            localStorage.setItem('preferred-language', lang);
        }

        // Next page navigation function
        function goToNextPage(title-page.html) {
            // Add exit animation
            const btn = document.querySelector('.next-page-btn');
            btn.style.transform = 'scale(0.95)';
            
            setTimeout(() => {
                // Option 1: Navigate to contents.html (if you create a separate file)
                window.location.href = 'contents.html';
                
                // Option 2: Smooth scroll to contents section (if single page app)
                // document.getElementById('contents').scrollIntoView({ behavior: 'smooth' });
                
                // Option 3: Alert for demonstration (remove in production)
                // alert('Navigation to Contents page');
            }, 200);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('preferred-language') || 'en';
            if (savedLang !== 'en') {
                changeLanguage(savedLang);
            }

            // Add transition styles dynamically
            document.querySelectorAll('[data-i18n]').forEach(el => {
                el.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
            });
        });

        // Keyboard navigation support
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === 'ArrowRight') {
                goToNextPage(title-page.html);
            }
        });
    </script>
</body>
</html>
